{% extends "base.html" %}
{% block title %}Verification problem - Kanzen Suite{% endblock %}

{% block fullpage %}
<div class="auth-wrapper">
  <div class="auth-form-panel">
    <div class="auth-form-container">
      <a href="{% url 'frontend:landing' %}" class="auth-logo">
        <div class="auth-logo-icon"><i class="ti ti-hexagon-filled"></i></div>
        <span>Kanzen Suite</span>
      </a>

      <div class="text-center my-4">
        <div class="auth-logo-icon mx-auto mb-3" style="width:64px;height:64px;font-size:2rem;background:#fef2f2;color:#dc2626;">
          <i class="ti ti-alert-triangle"></i>
        </div>
        <h1 class="auth-title">We couldn't verify your email</h1>
        <p class="text-muted mt-2">{{ message }}</p>
      </div>

      <a href="{% url 'frontend:register' %}" class="btn btn-primary w-100 btn-lg">
        Start over
      </a>

      <div class="auth-footer-links mt-3">
        <p>Already have an account? <a href="{% url 'frontend:login' %}">Sign in</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
