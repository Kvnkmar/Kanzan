{% extends "base.html" %}

{% block title %}Calendar - Kanzen Suite{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<style>
.fcw-event--dark { background: transparent !important; color: #FFFFFF !important; }
.fcw-event--dark:hover { background: rgba(255,255,255,0.06) !important; }
.fcd-tl-event--dark { background: transparent !important; color: #FFFFFF !important; }
.fcd-tl-event--dark:hover { background: rgba(255,255,255,0.06) !important; }

/* ================================================================
   Flatpickr — Theme-aware (light default, dark override)
   ================================================================ */
.flatpickr-calendar {
  font-family: 'Inter', sans-serif !important;
  border-radius: 14px !important;
  overflow: hidden;
  border: 1px solid #E2E8F0 !important;
  background: #fff !important;
  box-shadow: 0 10px 40px rgba(0,0,0,0.10) !important;
  padding: 0;
}
.flatpickr-calendar.arrowTop::before,
.flatpickr-calendar.arrowTop::after { display: none !important; }
.flatpickr-months .flatpickr-month { background: transparent !important; }
.flatpickr-months .flatpickr-prev-month,
.flatpickr-months .flatpickr-next-month { fill: #6B7280 !important; color: #6B7280 !important; border-radius: 8px; transition: all 0.15s; }
.flatpickr-months .flatpickr-prev-month:hover,
.flatpickr-months .flatpickr-next-month:hover { background: #F3F4F6 !important; fill: #111827 !important; }
.flatpickr-current-month { color: #111827 !important; font-weight: 700 !important; }
.flatpickr-current-month .flatpickr-monthDropdown-months,
.flatpickr-current-month input.cur-year { color: #111827 !important; font-weight: 700 !important; }
.flatpickr-current-month .flatpickr-monthDropdown-months option { background: #fff; color: #111827; }
.flatpickr-weekdays { background: transparent !important; }
span.flatpickr-weekday { color: #9CA3AF !important; font-weight: 600 !important; font-size: 0.6875rem !important; text-transform: uppercase; letter-spacing: 0.04em; }
.flatpickr-day { color: #374151 !important; border-radius: 10px !important; border: 2px solid transparent; transition: all 0.12s; }
.flatpickr-day:hover { background: #F3F4F6 !important; border-color: transparent !important; color: #111827 !important; }
.flatpickr-day.today { border-color: var(--crm-primary, #DC2626) !important; background: transparent !important; color: var(--crm-primary, #DC2626) !important; font-weight: 700; }
.flatpickr-day.today:hover { background: rgba(220,38,38,0.08) !important; }
.flatpickr-day.selected,
.flatpickr-day.selected:hover { background: var(--crm-primary, #DC2626) !important; border-color: var(--crm-primary, #DC2626) !important; color: #fff !important; }
.flatpickr-day.prevMonthDay,
.flatpickr-day.nextMonthDay { color: #D1D5DB !important; }
.flatpickr-day.prevMonthDay:hover,
.flatpickr-day.nextMonthDay:hover { background: #F9FAFB !important; color: #9CA3AF !important; }
.flatpickr-time { border-top: 1px solid #E5E7EB !important; background: #F9FAFB !important; }
.flatpickr-time input { color: #374151 !important; font-weight: 600 !important; }
.flatpickr-time input:hover,
.flatpickr-time input:focus { background: #EEF2FF !important; }
.flatpickr-time .flatpickr-am-pm { color: var(--crm-primary, #DC2626) !important; font-weight: 700 !important; }
.flatpickr-time .flatpickr-am-pm:hover { background: #EEF2FF !important; }
.flatpickr-time .flatpickr-time-separator { color: #D1D5DB !important; }
.numInputWrapper span { border: none !important; opacity: 0; transition: opacity 0.15s; }
.numInputWrapper:hover span { opacity: 1; }
.numInputWrapper span:hover { background: rgba(0,0,0,0.05) !important; }

/* -- Dark-mode overrides -- */
[data-bs-theme="dark"] .flatpickr-calendar { background: #1A2030 !important; border-color: rgba(255,255,255,0.08) !important; box-shadow: 0 16px 48px rgba(0,0,0,0.45) !important; }
[data-bs-theme="dark"] .flatpickr-months .flatpickr-prev-month,
[data-bs-theme="dark"] .flatpickr-months .flatpickr-next-month { fill: #94A3B8 !important; color: #94A3B8 !important; }
[data-bs-theme="dark"] .flatpickr-months .flatpickr-prev-month:hover,
[data-bs-theme="dark"] .flatpickr-months .flatpickr-next-month:hover { background: rgba(255,255,255,0.08) !important; fill: #F1F5F9 !important; }
[data-bs-theme="dark"] .flatpickr-current-month,
[data-bs-theme="dark"] .flatpickr-current-month .flatpickr-monthDropdown-months,
[data-bs-theme="dark"] .flatpickr-current-month input.cur-year { color: #F1F5F9 !important; }
[data-bs-theme="dark"] .flatpickr-current-month .flatpickr-monthDropdown-months option { background: #1A2030; color: #F1F5F9; }
[data-bs-theme="dark"] span.flatpickr-weekday { color: #64748B !important; }
[data-bs-theme="dark"] .flatpickr-day { color: #E2E8F0 !important; }
[data-bs-theme="dark"] .flatpickr-day:hover { background: rgba(255,255,255,0.08) !important; color: #FFFFFF !important; }
[data-bs-theme="dark"] .flatpickr-day.today { color: var(--crm-primary) !important; background: rgba(220,38,38,0.12) !important; }
[data-bs-theme="dark"] .flatpickr-day.prevMonthDay,
[data-bs-theme="dark"] .flatpickr-day.nextMonthDay { color: #475569 !important; }
[data-bs-theme="dark"] .flatpickr-day.prevMonthDay:hover,
[data-bs-theme="dark"] .flatpickr-day.nextMonthDay:hover { background: rgba(255,255,255,0.04) !important; color: #94A3B8 !important; }
[data-bs-theme="dark"] .flatpickr-time { background: #151A23 !important; border-top-color: rgba(255,255,255,0.06) !important; }
[data-bs-theme="dark"] .flatpickr-time input { color: #E2E8F0 !important; }
[data-bs-theme="dark"] .flatpickr-time input:hover,
[data-bs-theme="dark"] .flatpickr-time input:focus { background: rgba(255,255,255,0.06) !important; }
[data-bs-theme="dark"] .flatpickr-time .flatpickr-am-pm { color: #94A3B8 !important; }
[data-bs-theme="dark"] .flatpickr-time .flatpickr-am-pm:hover { background: rgba(255,255,255,0.06) !important; }
[data-bs-theme="dark"] .flatpickr-time .flatpickr-time-separator { color: #475569 !important; }
[data-bs-theme="dark"] .numInputWrapper span:hover { background: rgba(255,255,255,0.08) !important; }

/* Input wrapper with icon */
.fp-input-wrap {
  position: relative;
}
.fp-input-wrap .form-control {
  padding-right: 2.25rem;
  cursor: pointer;
}
.fp-input-wrap .fp-icon {
  position: absolute;
  right: 0.75rem;
  top: 50%;
  transform: translateY(-50%);
  color: #64748b;
  pointer-events: none;
  font-size: 1rem;
}

/* Event type pills */
.cal-type-pill {
  display: inline-flex;
  align-items: center;
  padding: 0.3rem 0.7rem;
  font-size: 0.75rem;
  font-weight: 500;
  border-radius: 999px;
  border: 1px solid var(--crm-border);
  background: transparent;
  color: var(--crm-text-muted);
  cursor: pointer;
  transition: all 0.15s ease;
}
.cal-type-pill:hover {
  border-color: var(--crm-text-secondary);
  color: var(--crm-text-secondary);
}
.cal-type-pill.active {
  background: var(--crm-primary);
  border-color: var(--crm-primary);
  color: #fff;
}

/* Color picker dots */
.cal-color-dot {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: all 0.15s ease;
  position: relative;
}
.cal-color-dot:first-child {
  background: var(--crm-bg-secondary, rgba(255,255,255,0.06));
  border-color: var(--crm-border);
}
.cal-color-dot:hover {
  transform: scale(1.15);
}
.cal-color-dot.active {
  box-shadow: 0 0 0 2px var(--crm-bg), 0 0 0 4px currentColor;
}
.cal-color-dot:first-child.active {
  box-shadow: 0 0 0 2px var(--crm-bg), 0 0 0 4px var(--crm-text-muted);
}
</style>
{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Calendar</h1>
    <p class="page-subtitle">View ticket events and important dates</p>
  </div>
  <div class="header-actions d-flex gap-2 align-items-center">
    <div class="cal-view-switcher" role="group" id="calViewTabs">
      <button type="button" class="cal-view-btn" data-view="day"><i class="ti ti-calendar me-1"></i>Day</button>
      <button type="button" class="cal-view-btn" data-view="week"><i class="ti ti-calendar me-1"></i>Week</button>
      <button type="button" class="cal-view-btn active" data-view="month"><i class="ti ti-calendar-check me-1"></i>Month</button>
    </div>
    <button type="button" class="btn btn-sm btn-primary" id="calAddEvent">
      <i class="ti ti-plus me-1"></i>Add Event
    </button>
  </div>
</div>

<div class="card cal-card">
  <div class="card-body p-3">
    <div class="full-calendar" id="fullCalendar"></div>
  </div>
</div>

<!-- Event Detail Modal -->
<div class="modal fade" id="eventDetailModal" tabindex="-1" aria-labelledby="eventDetailModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" style="max-width:420px;">
    <div class="modal-content event-detail-modal">
      <div class="modal-body p-0">
        <!-- Header zone -->
        <div class="event-detail-header">
          <div class="d-flex align-items-start justify-content-between gap-2">
            <h6 class="mb-0 fw-bold" id="eventDetailModalLabel" style="font-size:1.0625rem;line-height:1.4;color:var(--crm-text);">Event Details</h6>
            <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="modal" aria-label="Close" style="margin:-2px -4px 0 0;"></button>
          </div>
          <div id="eventDetailBadges" class="d-flex align-items-center flex-wrap gap-2 mt-2" style="display:none;"></div>
        </div>
        <!-- Body -->
        <div id="eventDetailBody" class="event-detail-body"></div>
        <!-- Footer -->
        <div id="eventDetailFooter" class="event-detail-footer" style="display:none;">
          <div class="d-flex align-items-center gap-2">
            <button type="button" class="btn btn-sm btn-ghost-danger" id="eventDetailDelete">
              <i class="ti ti-trash me-1"></i>Delete
            </button>
            <button type="button" class="btn btn-sm btn-ghost" id="eventDetailEdit" style="color:var(--crm-text-secondary);">
              <i class="ti ti-pencil me-1"></i>Edit
            </button>
          </div>
          <a href="#" class="btn btn-sm btn-primary" id="eventDetailLink" style="padding:0.4rem 1rem;border-radius:8px;">
            <i class="ti ti-arrow-right me-1"></i>View Ticket
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Event Modal -->
<div class="modal fade" id="addEventModal" tabindex="-1" aria-labelledby="addEventModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" style="max-width:520px;">
    <div class="modal-content" style="border:none;border-radius:0.75rem;overflow:hidden;">
      <!-- Colored top accent bar -->
      <div id="eventModalAccent" style="height:4px;background:var(--crm-primary);"></div>
      <div class="modal-body p-4">
        <div class="d-flex align-items-center justify-content-between mb-4">
          <h5 class="modal-title fw-bold mb-0" id="addEventModalLabel" style="font-size:1.125rem;">New Event</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <form id="addEventForm" autocomplete="off">
          <!-- Title -->
          <div class="mb-3">
            <input type="text" class="form-control form-control-lg" id="eventTitle" placeholder="Event title" required
              style="font-size:1rem;font-weight:600;border:none;border-bottom:2px solid var(--crm-border);border-radius:0;padding-left:0;background:transparent;">
          </div>

          <!-- Event type pills -->
          <div class="mb-3">
            <div class="d-flex flex-wrap gap-2" id="eventTypePills">
              <button type="button" class="cal-type-pill" data-type="meeting"><i class="ti ti-users me-1"></i>Meeting</button>
              <button type="button" class="cal-type-pill" data-type="call"><i class="ti ti-phone me-1"></i>Call</button>
              <button type="button" class="cal-type-pill" data-type="task"><i class="ti ti-checkbox me-1"></i>Task</button>
              <button type="button" class="cal-type-pill" data-type="reminder"><i class="ti ti-bell me-1"></i>Reminder</button>
              <button type="button" class="cal-type-pill active" data-type="other"><i class="ti ti-dots me-1"></i>Other</button>
            </div>
            <input type="hidden" id="eventType" value="other">
          </div>

          <!-- All day toggle -->
          <div class="mb-3 d-flex align-items-center gap-2">
            <div class="form-check form-switch mb-0">
              <input class="form-check-input" type="checkbox" id="eventAllDay" role="switch">
              <label class="form-check-label small fw-medium" for="eventAllDay">All day</label>
            </div>
          </div>

          <!-- Start date/time row -->
          <div class="row g-2 mb-2">
            <div class="col">
              <label class="form-label small text-muted mb-1"><i class="ti ti-calendar me-1"></i>Start</label>
              <div class="fp-input-wrap">
                <input type="text" class="form-control form-control-sm" id="eventDate" placeholder="Date" required readonly>
              </div>
            </div>
            <div class="col" id="startTimeCol">
              <label class="form-label small text-muted mb-1">&nbsp;</label>
              <div class="fp-input-wrap">
                <input type="text" class="form-control form-control-sm" id="eventTime" placeholder="Time" readonly>
              </div>
            </div>
          </div>

          <!-- End date/time row -->
          <div class="row g-2 mb-3">
            <div class="col">
              <label class="form-label small text-muted mb-1"><i class="ti ti-calendar-event me-1"></i>End</label>
              <div class="fp-input-wrap">
                <input type="text" class="form-control form-control-sm" id="eventEndDate" placeholder="End date (optional)" readonly>
              </div>
            </div>
            <div class="col" id="endTimeCol">
              <label class="form-label small text-muted mb-1">&nbsp;</label>
              <div class="fp-input-wrap">
                <input type="text" class="form-control form-control-sm" id="eventEndTime" placeholder="End time" readonly>
              </div>
            </div>
          </div>

          <!-- Location -->
          <div class="mb-3">
            <div class="input-group input-group-sm">
              <span class="input-group-text" style="background:transparent;border-right:none;"><i class="ti ti-map-pin text-muted"></i></span>
              <input type="text" class="form-control form-control-sm" id="eventLocation" placeholder="Add location" style="border-left:none;">
            </div>
          </div>

          <!-- Color picker -->
          <div class="mb-3">
            <label class="form-label small text-muted mb-1"><i class="ti ti-palette me-1"></i>Color</label>
            <div class="d-flex gap-2" id="eventColorPicker">
              <button type="button" class="cal-color-dot active" data-color="" title="Default"><i class="ti ti-circle-filled" style="color:var(--crm-text-muted);font-size:0.5rem;"></i></button>
              <button type="button" class="cal-color-dot" data-color="#EF4444" title="Red" style="background:#EF4444;"></button>
              <button type="button" class="cal-color-dot" data-color="#F59E0B" title="Amber" style="background:#F59E0B;"></button>
              <button type="button" class="cal-color-dot" data-color="#10B981" title="Green" style="background:#10B981;"></button>
              <button type="button" class="cal-color-dot" data-color="#3B82F6" title="Blue" style="background:#3B82F6;"></button>
              <button type="button" class="cal-color-dot" data-color="#8B5CF6" title="Purple" style="background:#8B5CF6;"></button>
              <button type="button" class="cal-color-dot" data-color="#EC4899" title="Pink" style="background:#EC4899;"></button>
              <button type="button" class="cal-color-dot" data-color="#2563EB" title="Blue" style="background:#2563EB;"></button>
            </div>
            <input type="hidden" id="eventColor" value="">
          </div>

          <!-- Description -->
          <div class="mb-1">
            <textarea class="form-control form-control-sm" id="eventDescription" rows="2" placeholder="Add notes or description..." style="resize:vertical;"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer px-4 py-3" style="border-top:1px solid var(--crm-border);">
        <button type="button" class="btn btn-sm btn-ghost" data-bs-dismiss="modal" style="color:var(--crm-text-muted);">Cancel</button>
        <button type="button" class="btn btn-sm btn-primary px-4" id="saveEventBtn">
          <span class="spinner-border spinner-border-sm d-none me-1" id="saveEventSpinner"></span>
          <span id="saveEventBtnText">Save Event</span>
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
(function() {
  "use strict";

  var calEl = document.getElementById('fullCalendar');
  if (!calEl) return;

  /* ------------------------------------------------------------------ */
  /*  State                                                              */
  /* ------------------------------------------------------------------ */
  var currentView = 'month'; // month | week | day
  var calDate = new Date();
  var eventsCache = {};

  var MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];
  var MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  var EVENT_COLORS = {
    'ticket':         '#2563EB',
    'meeting':        '#F59E0B',
    'call':           '#3B82F6',
    'task':           '#F59E0B',
    'reminder':       '#7C3AED',
    'other':          '#666666',
    'default':        '#666666'
  };

  var EVENT_BAR_COLORS_LIGHT = {
    'ticket':         { bg: '#EFF6FF', border: '#2563EB', text: '#1E40AF' },
    'meeting':        { bg: '#FEF3C7', border: '#F59E0B', text: '#92400E' },
    'call':           { bg: '#EFF6FF', border: '#3B82F6', text: '#1E40AF' },
    'task':           { bg: '#FFFBEB', border: '#F59E0B', text: '#92400E' },
    'reminder':       { bg: '#F5F3FF', border: '#7C3AED', text: '#5B21B6' },
    'other':          { bg: '#F1F5F9', border: '#6B7280', text: '#374151' }
  };
  var EVENT_BAR_COLORS_DARK = {
    'ticket':         { bg: 'rgba(37,99,235,0.12)', border: '#2563EB', text: '#93C5FD' },
    'meeting':        { bg: 'rgba(245,158,11,0.12)', border: '#F59E0B', text: '#FCD34D' },
    'call':           { bg: 'rgba(59,130,246,0.12)', border: '#3B82F6', text: '#93C5FD' },
    'task':           { bg: 'rgba(245,158,11,0.12)', border: '#F59E0B', text: '#FCD34D' },
    'reminder':       { bg: 'rgba(124,58,237,0.12)', border: '#7C3AED', text: '#C4B5FD' },
    'other':          { bg: 'rgba(255,255,255,0.06)', border: '#6B7280', text: '#9CA3AF' }
  };
  var DEFAULT_BAR_LIGHT = { bg: '#F1F5F9', border: '#6B7280', text: '#374151' };
  var DEFAULT_BAR_DARK = { bg: 'rgba(255,255,255,0.06)', border: '#6B7280', text: '#9CA3AF' };

  function isDarkMode() {
    return document.documentElement.getAttribute('data-bs-theme') === 'dark';
  }
  function getBarColors() {
    return isDarkMode() ? EVENT_BAR_COLORS_DARK : EVENT_BAR_COLORS_LIGHT;
  }
  function getDefaultBar() {
    return isDarkMode() ? DEFAULT_BAR_DARK : DEFAULT_BAR_LIGHT;
  }

  var editingEventId = null; // null = create mode, string = edit mode (event ID)

  var EVENT_TYPE_LABELS = {
    'ticket': 'Ticket',
    'meeting': 'Meeting',
    'call': 'Call',
    'task': 'Task',
    'reminder': 'Reminder',
    'other': 'Event'
  };

  /* ------------------------------------------------------------------ */
  /*  Utilities                                                          */
  /* ------------------------------------------------------------------ */
  function escapeHtml(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function dateKey(d) {
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
  }

  // Convert ISO datetime string to local date key (YYYY-MM-DD)
  function localDateKey(isoStr) {
    if (!isoStr) return null;
    var d = new Date(isoStr);
    return isNaN(d.getTime()) ? null : dateKey(d);
  }

  // Convert ISO datetime string to local time (HH:MM)
  function localTime(isoStr) {
    if (!isoStr) return null;
    var d = new Date(isoStr);
    return isNaN(d.getTime()) ? null : pad(d.getHours()) + ':' + pad(d.getMinutes());
  }

  function dateKeyYMD(y, m, d) {
    return y + '-' + pad(m + 1) + '-' + pad(d);
  }

  function getMonday(d) {
    var day = d.getDay();
    var diff = d.getDate() - (day === 0 ? 6 : day - 1);
    var mon = new Date(d);
    mon.setDate(diff);
    return mon;
  }

  function formatDateTime(isoStr) {
    if (!isoStr) return '';
    var d = new Date(isoStr);
    if (isNaN(d.getTime())) return '';
    return MONTH_SHORT[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear() +
           ' at ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }

  /* ------------------------------------------------------------------ */
  /*  Data Fetching                                                      */
  /* ------------------------------------------------------------------ */
  function fetchEventsForRange(startDate, endDate) {
    var key = startDate + ':' + endDate;
    if (eventsCache[key]) return Promise.resolve(eventsCache[key]);

    var ticketPromise = Api.get(
      '/api/v1/tickets/tickets/?created_at_after=' + startDate +
      '&created_at_before=' + endDate + 'T23:59:59&page_size=200'
    ).catch(function() { return { results: [] }; });

    var calEventPromise = Api.get(
      '/api/v1/analytics/calendar-events/?date_from=' + startDate +
      '&date_to=' + endDate + '&page_size=200'
    ).catch(function() { return { results: [] }; });

    return Promise.all([ticketPromise, calEventPromise]).then(function(results) {
      var events = {};
      var tickets = results[0].results || results[0] || [];
      tickets.forEach(function(t) {
        var ticketLabel = '#' + t.number + ' ' + (t.subject || t.title || 'Ticket');
        var createdDk = localDateKey(t.created_at);
        var dueDk = t.due_date ? localDateKey(t.due_date) : null;
        // One entry per ticket per unique day
        var dates = {};
        if (createdDk) dates[createdDk] = localTime(t.created_at);
        if (dueDk && !dates[dueDk]) dates[dueDk] = localTime(t.due_date);
        Object.keys(dates).forEach(function(dk) {
          if (!events[dk]) events[dk] = [];
          events[dk].push({
            type: 'ticket',
            label: ticketLabel,
            time: dates[dk],
            ticket: t
          });
        });
      });
      var calEvents = results[1].results || results[1] || [];
      calEvents.forEach(function(ce) {
        var dk = ce.event_date;
        if (!events[dk]) events[dk] = [];
        events[dk].push({
          type: ce.event_type,
          label: ce.title,
          time: (ce.is_all_day ? null : (ce.event_time ? ce.event_time.substring(0, 5) : null)),
          customColor: ce.color || '',
          calEvent: ce
        });
      });
      eventsCache[key] = events;
      return events;
    });
  }

  function invalidateCache() {
    eventsCache = {};
  }

  /* ------------------------------------------------------------------ */
  /*  Event Detail Popup                                                 */
  /* ------------------------------------------------------------------ */
  var detailModal = new bootstrap.Modal(document.getElementById('eventDetailModal'));

  function showEventDetail(ev) {
    var body = document.getElementById('eventDetailBody');
    var footer = document.getElementById('eventDetailFooter');
    var badgesEl = document.getElementById('eventDetailBadges');
    var deleteBtn = document.getElementById('eventDetailDelete');
    var editBtn = document.getElementById('eventDetailEdit');
    var linkBtn = document.getElementById('eventDetailLink');
    var titleEl = document.getElementById('eventDetailModalLabel');

    var html = '';

    if (ev.ticket) {
      // ── Ticket detail view ──
      var t = ev.ticket;
      titleEl.textContent = '#' + t.number + ' ' + (t.subject || '');

      // Status + Priority badges in header
      var badgeHtml = '';
      if (t.status_name) {
        badgeHtml += '<span class="badge event-detail-badge" style="background-color:' + escapeHtml(t.status_color || '#94A3B8') + ';">' + escapeHtml(t.status_name) + '</span>';
      }
      if (t.priority) {
        var priColors = { urgent: '#EF4444', high: '#F59E0B', medium: '#3B82F6', low: '#64748B' };
        var priColor = priColors[t.priority] || '#64748B';
        badgeHtml += '<span class="badge event-detail-badge" style="background-color:' + escapeHtml(priColor) + ';">' + escapeHtml(t.priority.charAt(0).toUpperCase() + t.priority.slice(1)) + '</span>';
      }
      if (t.category) {
        badgeHtml += '<span class="badge event-detail-badge" style="background:rgba(139,92,246,0.12);color:#C4B5FD;">' + escapeHtml(t.category) + '</span>';
      }
      if (t.is_closed) {
        badgeHtml += '<span class="badge event-detail-badge" style="background:rgba(16,185,129,0.12);color:#6EE7B7;"><i class="ti ti-check me-1"></i>Closed</span>';
      }
      badgesEl.innerHTML = badgeHtml;
      badgesEl.style.display = badgeHtml ? '' : 'none';

      // SLA breach warnings
      if (t.sla_response_breached || t.sla_resolution_breached) {
        html += '<div class="event-detail-sla-alert">';
        html += '<div class="d-flex align-items-center gap-2">';
        html += '<i class="ti ti-alert-triangle" style="color:#EF4444;font-size:0.9375rem;"></i>';
        html += '<span style="font-size:0.8125rem;color:#FCA5A5;font-weight:600;">SLA Breached</span>';
        html += '</div>';
        if (t.sla_response_breached) {
          html += '<div style="font-size:0.75rem;color:#FCA5A5;margin-left:24px;margin-top:2px;">Response time exceeded</div>';
        }
        if (t.sla_resolution_breached) {
          html += '<div style="font-size:0.75rem;color:#FCA5A5;margin-left:24px;margin-top:2px;">Resolution time exceeded</div>';
        }
        html += '</div>';
      }

      // Description preview
      if (t.description) {
        var descText = t.description.length > 200 ? t.description.substring(0, 200) + '\u2026' : t.description;
        html += '<div class="event-detail-desc">' + escapeHtml(descText) + '</div>';
      }

      // Info rows
      function infoRow(icon, label, value, valueColor) {
        return '<div class="event-detail-row">' +
          '<div class="event-detail-row-label">' +
          '<i class="ti ti-' + escapeHtml(icon) + '"></i>' +
          '<span>' + escapeHtml(label) + '</span>' +
          '</div>' +
          '<span class="event-detail-row-value"' + (valueColor ? ' style="color:' + escapeHtml(valueColor) + ';"' : '') + '>' + escapeHtml(value) + '</span>' +
          '</div>';
      }

      html += '<div class="event-detail-info">';
      if (t.assignee_name) {
        html += infoRow('user', 'Assignee', t.assignee_name);
      } else {
        html += infoRow('user-x', 'Assignee', 'Unassigned', '#64748B');
      }
      if (t.queue_name) {
        html += infoRow('inbox', 'Queue', t.queue_name);
      }
      if (t.contact_name) {
        html += infoRow('address-book', 'Contact', t.contact_name);
      }
      html += infoRow('calendar-plus', 'Created', formatDateTime(t.created_at));
      if (t.due_date) {
        var now = new Date();
        var dueDate = new Date(t.due_date);
        var isOverdue = !t.is_closed && dueDate < now;
        html += infoRow('calendar-event', 'Due', formatDateTime(t.due_date), isOverdue ? '#EF4444' : '');
      }
      if (t.updated_at && t.updated_at !== t.created_at) {
        html += infoRow('refresh', 'Updated', formatDateTime(t.updated_at));
      }
      html += '</div>';

      // Tags
      if (t.tags && t.tags.length > 0) {
        html += '<div class="event-detail-tags">';
        html += '<i class="ti ti-tags" style="font-size:0.8125rem;color:var(--crm-text-muted);"></i>';
        var tagList = Array.isArray(t.tags) ? t.tags : [];
        tagList.forEach(function(tag) {
          html += '<span class="event-detail-tag">' + escapeHtml(tag) + '</span>';
        });
        html += '</div>';
      }

      body.innerHTML = html;

      linkBtn.href = '/tickets/' + t.number + '/';
      linkBtn.style.display = '';
      deleteBtn.style.display = 'none';
      editBtn.style.display = 'none';
      footer.style.display = '';
    } else {
      // ── Calendar event detail view ──
      var ce = ev.calEvent || {};
      var color = ce.color || EVENT_COLORS[ev.type] || EVENT_COLORS['default'];
      var typeLabel = EVENT_TYPE_LABELS[ev.type] || ev.type.replace(/_/g, ' ');

      titleEl.textContent = ev.label || 'Event Details';
      badgesEl.innerHTML = '<span class="badge event-detail-badge" style="background:' + escapeHtml(color) + ';font-size:0.6875rem;">' + escapeHtml(typeLabel) + '</span>';
      badgesEl.style.display = '';

      // Description
      if (ce.description) {
        html += '<div class="event-detail-desc">' + escapeHtml(ce.description) + '</div>';
      }

      // Info rows
      html += '<div class="event-detail-info">';
      if (ce.is_all_day) {
        var timeStr = 'All day';
        if (ce.end_date && ce.end_date !== ce.event_date) timeStr += ' \u2013 ' + ce.end_date;
        html += '<div class="event-detail-row"><div class="event-detail-row-label"><i class="ti ti-clock"></i><span>Time</span></div><span class="event-detail-row-value">' + escapeHtml(timeStr) + '</span></div>';
      } else if (ev.time) {
        var timeDisplay = ev.time;
        if (ce.end_time) timeDisplay += ' \u2013 ' + ce.end_time.substring(0, 5);
        if (ce.end_date && ce.end_date !== ce.event_date) timeDisplay += ' (' + ce.end_date + ')';
        html += '<div class="event-detail-row"><div class="event-detail-row-label"><i class="ti ti-clock"></i><span>Time</span></div><span class="event-detail-row-value">' + escapeHtml(timeDisplay) + '</span></div>';
      }
      if (ce.location) {
        html += '<div class="event-detail-row"><div class="event-detail-row-label"><i class="ti ti-map-pin"></i><span>Location</span></div><span class="event-detail-row-value">' + escapeHtml(ce.location) + '</span></div>';
      }
      html += '</div>';

      body.innerHTML = html;

      linkBtn.style.display = 'none';
      if (ev.calEvent) {
        deleteBtn.style.display = '';
        editBtn.style.display = '';
        deleteBtn.onclick = function() {
          if (confirm('Delete this event?')) {
            Api.delete('/api/v1/analytics/calendar-events/' + ev.calEvent.id + '/').then(function() {
              Toast.success('Event deleted');
              detailModal.hide();
              invalidateCache();
              renderCurrentView();
            }).catch(function() {
              Toast.error('Failed to delete event');
            });
          }
        };
        editBtn.onclick = function() {
          detailModal.hide();
          openEditEventModal(ev.calEvent);
        };
        footer.style.display = '';
      } else {
        deleteBtn.style.display = 'none';
        editBtn.style.display = 'none';
        footer.style.display = 'none';
      }
    }

    detailModal.show();
  }

  /* ------------------------------------------------------------------ */
  /*  MONTH VIEW                                                         */
  /* ------------------------------------------------------------------ */
  function renderMonthView() {
    var year = calDate.getFullYear();
    var month = calDate.getMonth();
    var today = new Date();
    var todayKey = dateKey(today);

    var firstDay = new Date(year, month, 1).getDay();
    var daysInMonth = new Date(year, month + 1, 0).getDate();
    var daysInPrev = new Date(year, month, 0).getDate();

    var html = '<div class="fc-header">';
    html += '<button type="button" class="fc-nav-btn fc-prev"><i class="ti ti-chevron-left"></i></button>';
    html += '<h4 class="fc-month-label">' + MONTH_NAMES[month] + ' ' + year + '</h4>';
    html += '<button type="button" class="fc-nav-btn fc-next"><i class="ti ti-chevron-right"></i></button>';
    html += '</div>';

    html += '<div class="fc-grid">';
    for (var d = 0; d < 7; d++) {
      html += '<div class="fc-day-header">' + DAY_SHORT[d] + '</div>';
    }

    for (var p = firstDay - 1; p >= 0; p--) {
      html += '<div class="fc-day fc-day--outside"><span class="fc-day-num">' + (daysInPrev - p) + '</span></div>';
    }

    for (var i = 1; i <= daysInMonth; i++) {
      var dk = dateKeyYMD(year, month, i);
      var cls = 'fc-day';
      if (dk === todayKey) cls += ' fc-day--today';
      html += '<div class="' + cls + '" data-date="' + dk + '">';
      html += '<span class="fc-day-num">' + i + '</span>';
      html += '<div class="fc-day-events" id="events-' + dk + '"></div>';
      html += '</div>';
    }

    var totalCells = firstDay + daysInMonth;
    var remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (var r = 1; r <= remaining; r++) {
      html += '<div class="fc-day fc-day--outside"><span class="fc-day-num">' + r + '</span></div>';
    }
    html += '</div>';

    calEl.innerHTML = html;

    // Navigation
    calEl.querySelector('.fc-prev').addEventListener('click', function() {
      calDate.setMonth(calDate.getMonth() - 1);
      renderMonthView();
    });
    calEl.querySelector('.fc-next').addEventListener('click', function() {
      calDate.setMonth(calDate.getMonth() + 1);
      renderMonthView();
    });

    // Fetch events
    var startDate = dateKeyYMD(year, month, 1);
    var endDay = new Date(year, month + 1, 0).getDate();
    var endDate = dateKeyYMD(year, month, endDay);

    fetchEventsForRange(startDate, endDate).then(function(events) {
      Object.keys(events).forEach(function(dk) {
        var evContainer = document.getElementById('events-' + dk);
        if (!evContainer) return;
        var dayEvents = events[dk];
        var maxShow = 3;

        dayEvents.sort(function(a, b) {
          if (a.time && !b.time) return -1;
          if (!a.time && b.time) return 1;
          if (a.time && b.time) return a.time.localeCompare(b.time);
          return 0;
        });

        dayEvents.slice(0, maxShow).forEach(function(ev) {
          var dot = document.createElement('div');
          dot.className = 'fc-event';
          dot.style.borderLeftColor = ev.customColor || EVENT_COLORS[ev.type] || EVENT_COLORS['default'];
          var timePrefix = ev.time ? ev.time + ' ' : '';
          dot.textContent = timePrefix + ev.label;
          dot.addEventListener('click', function(e) {
            e.stopPropagation();
            showEventDetail(ev);
          });
          evContainer.appendChild(dot);
        });
        if (dayEvents.length > maxShow) {
          var more = document.createElement('div');
          more.className = 'fc-event-more';
          more.textContent = '+' + (dayEvents.length - maxShow) + ' more';
          more.addEventListener('click', function(e) {
            e.stopPropagation();
            // Show first overflow event
            showEventDetail(dayEvents[maxShow]);
          });
          evContainer.appendChild(more);
        }
      });
    });

    // Day click -> add event
    calEl.querySelectorAll('.fc-day:not(.fc-day--outside)').forEach(function(dayEl) {
      dayEl.addEventListener('click', function() {
        openAddEventModal(this.dataset.date);
      });
    });
  }

  /* ------------------------------------------------------------------ */
  /*  WEEK VIEW                                                          */
  /* ------------------------------------------------------------------ */
  function renderWeekView() {
    var monday = getMonday(calDate);
    var sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    var today = new Date();
    var todayKey = dateKey(today);

    var weekLabel = MONTH_SHORT[monday.getMonth()] + ' ' + monday.getDate() +
      ' \u2013 ' + MONTH_SHORT[sunday.getMonth()] + ' ' + sunday.getDate() + ', ' + sunday.getFullYear();

    var html = '<div class="fc-header">';
    html += '<button type="button" class="fc-nav-btn fc-prev"><i class="ti ti-chevron-left"></i></button>';
    html += '<h4 class="fc-month-label">' + weekLabel + '</h4>';
    html += '<button type="button" class="fc-nav-btn fc-next"><i class="ti ti-chevron-right"></i></button>';
    html += '</div>';

    html += '<div class="fcw-grid">';

    // Build 7 day columns
    for (var i = 0; i < 7; i++) {
      var day = new Date(monday);
      day.setDate(monday.getDate() + i);
      var dk = dateKey(day);
      var isToday = dk === todayKey;

      html += '<div class="fcw-col' + (isToday ? ' fcw-col--today' : '') + '" data-date="' + dk + '">';
      html += '<div class="fcw-col-header">';
      html += '<span class="fcw-col-day">' + DAY_SHORT[day.getDay()] + '</span>';
      html += '<span class="fcw-col-num' + (isToday ? ' fcw-col-num--today' : '') + '">' + day.getDate() + '</span>';
      html += '</div>';
      html += '<div class="fcw-col-events" id="wk-events-' + dk + '"></div>';
      html += '</div>';
    }

    html += '</div>';
    calEl.innerHTML = html;

    // Navigation
    calEl.querySelector('.fc-prev').addEventListener('click', function() {
      calDate.setDate(calDate.getDate() - 7);
      renderWeekView();
    });
    calEl.querySelector('.fc-next').addEventListener('click', function() {
      calDate.setDate(calDate.getDate() + 7);
      renderWeekView();
    });

    // Fetch events
    var startDate = dateKey(monday);
    var endDate = dateKey(sunday);

    fetchEventsForRange(startDate, endDate).then(function(events) {
      Object.keys(events).forEach(function(dk) {
        var evContainer = document.getElementById('wk-events-' + dk);
        if (!evContainer) return;
        var dayEvents = events[dk];

        dayEvents.sort(function(a, b) {
          if (a.time && !b.time) return -1;
          if (!a.time && b.time) return 1;
          if (a.time && b.time) return a.time.localeCompare(b.time);
          return 0;
        });

        dayEvents.forEach(function(ev) {
          var colors = getBarColors()[ev.type] || getDefaultBar();
          var bar = document.createElement('div');
          bar.className = isDarkMode() ? 'fcw-event fcw-event--dark' : 'fcw-event';
          bar.style.borderLeftColor = ev.customColor || colors.border;
          if (!isDarkMode()) {
            bar.style.background = colors.bg;
            bar.style.color = colors.text;
          }

          var timeStr = ev.time ? '<span class="fcw-event-time">' + escapeHtml(ev.time) + '</span>' : '';
          bar.innerHTML = timeStr + '<span class="fcw-event-label">' + escapeHtml(ev.label) + '</span>';
          bar.addEventListener('click', function(e) {
            e.stopPropagation();
            showEventDetail(ev);
          });
          evContainer.appendChild(bar);
        });
      });
    });

    // Column click -> add event
    calEl.querySelectorAll('.fcw-col').forEach(function(col) {
      col.addEventListener('click', function(e) {
        if (!e.target.closest('.fcw-event')) {
          openAddEventModal(this.dataset.date);
        }
      });
    });
  }

  /* ------------------------------------------------------------------ */
  /*  DAY VIEW — Hour-by-hour Timeline                                   */
  /* ------------------------------------------------------------------ */
  var DAY_START_HOUR = 6;  // 6 AM
  var DAY_END_HOUR = 22;   // 10 PM

  function formatHourLabel(h) {
    if (h === 0) return '12 AM';
    if (h < 12) return h + ' AM';
    if (h === 12) return '12 PM';
    return (h - 12) + ' PM';
  }

  function renderDayView() {
    var today = new Date();
    var todayKey = dateKey(today);
    var dk = dateKey(calDate);
    var isToday = dk === todayKey;

    var dayLabel = DAY_NAMES[calDate.getDay()] + ', ' +
      MONTH_NAMES[calDate.getMonth()] + ' ' + calDate.getDate() + ', ' + calDate.getFullYear();

    var html = '<div class="fc-header">';
    html += '<button type="button" class="fc-nav-btn fc-prev"><i class="ti ti-chevron-left"></i></button>';
    html += '<h4 class="fc-month-label">' + dayLabel + '</h4>';
    html += '<button type="button" class="fc-nav-btn fc-next"><i class="ti ti-chevron-right"></i></button>';
    html += '</div>';

    // All-day section
    html += '<div class="fcd-allday" id="dayAllDay">';
    html += '<span class="fcd-allday-label">All day</span>';
    html += '<div class="fcd-allday-events" id="dayAllDayEvents"></div>';
    html += '</div>';

    // Timeline grid
    html += '<div class="fcd-timeline" id="dayTimeline">';
    for (var h = DAY_START_HOUR; h <= DAY_END_HOUR; h++) {
      html += '<div class="fcd-hour-row" data-hour="' + h + '">';
      html += '<div class="fcd-hour-label">' + formatHourLabel(h) + '</div>';
      html += '<div class="fcd-hour-cell"></div>';
      html += '</div>';
    }
    // Now indicator placeholder
    if (isToday) {
      html += '<div class="fcd-now-line" id="dayNowLine"></div>';
    }
    html += '</div>';

    calEl.innerHTML = html;

    // Navigation
    calEl.querySelector('.fc-prev').addEventListener('click', function() {
      calDate.setDate(calDate.getDate() - 1);
      renderDayView();
    });
    calEl.querySelector('.fc-next').addEventListener('click', function() {
      calDate.setDate(calDate.getDate() + 1);
      renderDayView();
    });

    // Position "now" indicator
    if (isToday) {
      positionNowLine();
    }

    // Hour cell click -> add event with pre-filled time
    calEl.querySelectorAll('.fcd-hour-row').forEach(function(row) {
      row.addEventListener('click', function(e) {
        if (e.target.closest('.fcd-tl-event')) return;
        var h = parseInt(this.dataset.hour);
        openAddEventModal(dk);
        // Pre-fill time after modal opens
        setTimeout(function() {
          if (fpTime) fpTime.setDate(pad(h) + ':00', true);
        }, 100);
      });
    });

    // Fetch events and place on timeline
    fetchEventsForRange(dk, dk).then(function(events) {
      var dayEvents = events[dk] || [];
      var allDayEvents = [];
      var timedEvents = [];

      dayEvents.forEach(function(ev) {
        if (ev.time) {
          timedEvents.push(ev);
        } else {
          allDayEvents.push(ev);
        }
      });

      // Render all-day events
      var allDayContainer = document.getElementById('dayAllDayEvents');
      if (allDayEvents.length === 0) {
        allDayContainer.innerHTML = '<span class="fcd-allday-empty">No all-day events</span>';
      } else {
        allDayEvents.forEach(function(ev) {
          var colors = getBarColors()[ev.type] || getDefaultBar();
          var chip = document.createElement('div');
          chip.className = isDarkMode() ? 'fcd-tl-event fcd-tl-event--allday fcd-tl-event--dark' : 'fcd-tl-event fcd-tl-event--allday';
          chip.style.borderLeftColor = ev.customColor || colors.border;
          if (!isDarkMode()) {
            chip.style.background = colors.bg;
            chip.style.color = colors.text;
          }
          chip.textContent = ev.label;
          chip.addEventListener('click', function(e) {
            e.stopPropagation();
            showEventDetail(ev);
          });
          allDayContainer.appendChild(chip);
        });
      }

      // Render timed events on the timeline
      var timeline = document.getElementById('dayTimeline');
      timedEvents.forEach(function(ev) {
        var parts = ev.time.split(':');
        var hour = parseInt(parts[0]);
        var mins = parseInt(parts[1] || 0);
        if (hour < DAY_START_HOUR || hour > DAY_END_HOUR) return;

        var colors = getBarColors()[ev.type] || getDefaultBar();
        var typeLabel = EVENT_TYPE_LABELS[ev.type] || ev.type.replace(/_/g, ' ');
        var topOffset = (hour - DAY_START_HOUR) * 60 + mins; // px (1px per minute with 60px rows)

        var block = document.createElement('div');
        block.className = isDarkMode() ? 'fcd-tl-event fcd-tl-event--dark' : 'fcd-tl-event';
        block.style.top = topOffset + 'px';
        block.style.borderLeftColor = ev.customColor || colors.border;
        if (!isDarkMode()) {
          block.style.background = colors.bg;
          block.style.color = colors.text;
        }

        block.innerHTML =
          '<div class="fcd-tl-event-time">' + escapeHtml(ev.time) + '</div>' +
          '<div class="fcd-tl-event-label">' + escapeHtml(ev.label) + '</div>' +
          '<div class="fcd-tl-event-type">' + escapeHtml(typeLabel) + '</div>';

        block.addEventListener('click', function(e) {
          e.stopPropagation();
          showEventDetail(ev);
        });
        timeline.appendChild(block);
      });
    });
  }

  function positionNowLine() {
    var line = document.getElementById('dayNowLine');
    if (!line) return;
    var now = new Date();
    var h = now.getHours();
    var m = now.getMinutes();
    if (h < DAY_START_HOUR || h > DAY_END_HOUR) {
      line.style.display = 'none';
      return;
    }
    var top = (h - DAY_START_HOUR) * 60 + m;
    line.style.top = top + 'px';
    line.style.display = '';

    // Scroll to now
    var timeline = document.getElementById('dayTimeline');
    if (timeline) {
      timeline.scrollTop = Math.max(0, top - 120);
    }
  }

  /* ------------------------------------------------------------------ */
  /*  View Switching                                                     */
  /* ------------------------------------------------------------------ */
  function renderCurrentView() {
    if (currentView === 'month') renderMonthView();
    else if (currentView === 'week') renderWeekView();
    else if (currentView === 'day') renderDayView();
  }

  // View tab buttons
  var viewTabs = document.querySelectorAll('#calViewTabs button');
  viewTabs.forEach(function(btn) {
    btn.addEventListener('click', function() {
      viewTabs.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentView = btn.getAttribute('data-view');
      renderCurrentView();
    });
  });

  /* ------------------------------------------------------------------ */
  /*  Add Event Modal                                                    */
  /* ------------------------------------------------------------------ */
  var addEventModal = null;
  var modalEl = document.getElementById('addEventModal');
  if (modalEl) {
    addEventModal = new bootstrap.Modal(modalEl);
  }

  // -- Type pills --
  var typePills = document.querySelectorAll('#eventTypePills .cal-type-pill');
  typePills.forEach(function(pill) {
    pill.addEventListener('click', function() {
      typePills.forEach(function(p) { p.classList.remove('active'); });
      pill.classList.add('active');
      document.getElementById('eventType').value = pill.dataset.type;
    });
  });

  // -- Color picker --
  var colorDots = document.querySelectorAll('#eventColorPicker .cal-color-dot');
  colorDots.forEach(function(dot) {
    dot.addEventListener('click', function() {
      colorDots.forEach(function(d) { d.classList.remove('active'); });
      dot.classList.add('active');
      document.getElementById('eventColor').value = dot.dataset.color || '';
      var accent = document.getElementById('eventModalAccent');
      if (dot.dataset.color) accent.style.background = dot.dataset.color;
      else accent.style.background = 'var(--crm-primary)';
    });
  });

  // -- All-day toggle --
  var allDayCheck = document.getElementById('eventAllDay');
  allDayCheck.addEventListener('change', function() {
    var hide = this.checked;
    document.getElementById('startTimeCol').style.display = hide ? 'none' : '';
    document.getElementById('endTimeCol').style.display = hide ? 'none' : '';
    if (hide) {
      if (fpTime) fpTime.clear();
      if (fpEndTime) fpEndTime.clear();
    }
  });

  function resetModal() {
    document.getElementById('eventTitle').value = '';
    document.getElementById('eventType').value = 'other';
    document.getElementById('eventDescription').value = '';
    document.getElementById('eventLocation').value = '';
    document.getElementById('eventColor').value = '';
    document.getElementById('eventAllDay').checked = false;
    document.getElementById('startTimeCol').style.display = '';
    document.getElementById('endTimeCol').style.display = '';
    document.getElementById('eventModalAccent').style.background = 'var(--crm-primary)';
    typePills.forEach(function(p) { p.classList.remove('active'); });
    document.querySelector('.cal-type-pill[data-type="other"]').classList.add('active');
    colorDots.forEach(function(d) { d.classList.remove('active'); });
    document.querySelector('.cal-color-dot[data-color=""]').classList.add('active');
    if (fpDate) fpDate.clear();
    if (fpTime) fpTime.clear();
    if (fpEndDate) fpEndDate.clear();
    if (fpEndTime) fpEndTime.clear();
  }

  function openAddEventModal(dateStr) {
    if (!addEventModal) return;
    editingEventId = null;
    resetModal();
    if (dateStr && fpDate) fpDate.setDate(dateStr, true);
    var formattedDate = dateStr ? fpDate.formatDate(fpDate.parseDate(dateStr, 'Y-m-d'), 'F j, Y') : '';
    document.getElementById('addEventModalLabel').textContent = dateStr ? 'New Event \u2014 ' + formattedDate : 'New Event';
    document.getElementById('saveEventBtnText').textContent = 'Save Event';
    addEventModal.show();
    setTimeout(function() { document.getElementById('eventTitle').focus(); }, 200);
  }

  function openEditEventModal(calEvent) {
    if (!addEventModal) return;
    editingEventId = calEvent.id;
    resetModal();
    document.getElementById('eventTitle').value = calEvent.title || '';
    if (fpDate) fpDate.setDate(calEvent.event_date || '', true);
    if (fpTime && calEvent.event_time) fpTime.setDate(calEvent.event_time.substring(0, 5), true);
    if (fpEndDate && calEvent.end_date) fpEndDate.setDate(calEvent.end_date, true);
    if (fpEndTime && calEvent.end_time) fpEndTime.setDate(calEvent.end_time.substring(0, 5), true);
    // Set type pill
    var typeVal = calEvent.event_type || 'other';
    document.getElementById('eventType').value = typeVal;
    typePills.forEach(function(p) { p.classList.remove('active'); });
    var activePill = document.querySelector('.cal-type-pill[data-type="' + typeVal + '"]');
    if (activePill) activePill.classList.add('active');
    // Set all-day
    if (calEvent.is_all_day) {
      document.getElementById('eventAllDay').checked = true;
      document.getElementById('startTimeCol').style.display = 'none';
      document.getElementById('endTimeCol').style.display = 'none';
    }
    // Set location
    document.getElementById('eventLocation').value = calEvent.location || '';
    // Set color
    var colorVal = calEvent.color || '';
    document.getElementById('eventColor').value = colorVal;
    colorDots.forEach(function(d) { d.classList.remove('active'); });
    var activeDot = document.querySelector('.cal-color-dot[data-color="' + colorVal + '"]');
    if (activeDot) activeDot.classList.add('active');
    if (colorVal) document.getElementById('eventModalAccent').style.background = colorVal;
    // Set description
    document.getElementById('eventDescription').value = calEvent.description || '';
    document.getElementById('addEventModalLabel').textContent = 'Edit Event';
    document.getElementById('saveEventBtnText').textContent = 'Update Event';
    addEventModal.show();
  }

  // Header "Add Event" button
  document.getElementById('calAddEvent').addEventListener('click', function() {
    openAddEventModal(dateKey(new Date()));
  });

  // Save event
  var saveBtn = document.getElementById('saveEventBtn');
  var saveSpinner = document.getElementById('saveEventSpinner');
  if (saveBtn) {
    saveBtn.addEventListener('click', function() {
      var title = document.getElementById('eventTitle').value.trim();
      var date = document.getElementById('eventDate').value;
      var time = document.getElementById('eventTime').value || null;
      var endDate = document.getElementById('eventEndDate').value || null;
      var endTime = document.getElementById('eventEndTime').value || null;
      var type = document.getElementById('eventType').value;
      var isAllDay = document.getElementById('eventAllDay').checked;
      var location = document.getElementById('eventLocation').value.trim();
      var color = document.getElementById('eventColor').value;
      var description = document.getElementById('eventDescription').value.trim();

      if (!title) {
        Toast.warning('Please enter a title.');
        document.getElementById('eventTitle').focus();
        return;
      }
      if (!date) {
        Toast.warning('Please select a date.');
        document.getElementById('eventDate').focus();
        return;
      }

      saveBtn.disabled = true;
      saveSpinner.classList.remove('d-none');

      var payload = {
        title: title,
        event_date: date,
        event_time: isAllDay ? null : time,
        end_date: endDate,
        end_time: isAllDay ? null : endTime,
        event_type: type,
        is_all_day: isAllDay,
        location: location,
        color: color,
        description: description
      };

      var apiCall;
      if (editingEventId) {
        apiCall = Api.patch('/api/v1/analytics/calendar-events/' + editingEventId + '/', payload);
      } else {
        apiCall = Api.post('/api/v1/analytics/calendar-events/', payload);
      }

      apiCall.then(function() {
        Toast.success(editingEventId ? 'Event updated' : 'Event added');
        addEventModal.hide();
        editingEventId = null;
        invalidateCache();
        renderCurrentView();
      }).catch(function(err) {
        Toast.error('Failed to save event');
        console.error('Save event error:', err);
      }).finally(function() {
        saveBtn.disabled = false;
        saveSpinner.classList.add('d-none');
      });
    });
  }

  /* ------------------------------------------------------------------ */
  /*  Flatpickr Date & Time Pickers                                      */
  /* ------------------------------------------------------------------ */
  var fpDate = flatpickr('#eventDate', {
    dateFormat: 'Y-m-d',
    altInput: true,
    altFormat: 'M j, Y',
    disableMobile: true,
    allowInput: false,
    theme: 'dark'
  });

  var fpTime = flatpickr('#eventTime', {
    enableTime: true,
    noCalendar: true,
    dateFormat: 'H:i',
    altInput: true,
    altFormat: 'h:i K',
    disableMobile: true,
    allowInput: false,
    time_24hr: false,
    minuteIncrement: 15,
    theme: 'dark'
  });

  var fpEndDate = flatpickr('#eventEndDate', {
    dateFormat: 'Y-m-d',
    altInput: true,
    altFormat: 'M j, Y',
    disableMobile: true,
    allowInput: false,
    theme: 'dark'
  });

  var fpEndTime = flatpickr('#eventEndTime', {
    enableTime: true,
    noCalendar: true,
    dateFormat: 'H:i',
    altInput: true,
    altFormat: 'h:i K',
    disableMobile: true,
    allowInput: false,
    time_24hr: false,
    minuteIncrement: 15,
    theme: 'dark'
  });

  /* ------------------------------------------------------------------ */
  /*  Initial render                                                     */
  /* ------------------------------------------------------------------ */
  renderCurrentView();
})();
</script>
{% endblock %}
