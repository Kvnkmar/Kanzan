{% extends "base.html" %}

{% block title %}Access Denied - Kanzen Suite{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-content">
    <div class="error-icon">
      <i class="ti ti-shield-lock"></i>
    </div>
    <h1 class="error-code">403</h1>
    <h2 class="error-title">Access Denied</h2>
    <p class="error-message">
      {{ message|default:"You don't have permission to access this page. Contact your administrator if you believe this is an error." }}
    </p>
    <div class="error-actions">
      <a href="{% url 'frontend:dashboard' %}" class="btn btn-primary">
        <i class="ti ti-arrow-left me-1"></i> Back to Dashboard
      </a>
    </div>
  </div>
</div>
{% endblock %}
